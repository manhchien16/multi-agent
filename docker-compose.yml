# Multi-Agent Platform - Docker Compose
# Infrastructure services for local development

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: multiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multiagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
      # Performance tuning
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      # Optional: Increase max connections
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "5432:5432"
    volumes:
      # Data persistence
      - postgres_data:/var/lib/postgresql/data
      # Auto-init scripts (only runs on first start if DB is empty)
      - ./schemas/database:/docker-entrypoint-initdb.d:ro
      # Custom postgres config (optional)
      # - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multiagent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - multiagent-network
    # Resource limits (optional, comment out if not needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: multiagent-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multiagent-network

  # NATS Message Queue
  nats:
    image: nats:2.10-alpine
    container_name: multiagent-nats
    restart: unless-stopped
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP management
      - "6222:6222"  # Cluster connections
    command: "--jetstream --store_dir /data/jetstream --http_port 8222"
    volumes:
      - nats_data:/data
    healthcheck:
      # Use nc (netcat) which is available in alpine
      test: ["CMD", "nc", "-zv", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - multiagent-network

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: multiagent-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@multi-agent.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - multiagent-network
    profiles:
      - tools

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: multiagent-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - multiagent-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

networks:
  multiagent-network:
    driver: bridge
