apiVersion: v2
name: multi-agent-platform-agents
description: Helm chart for deploying Multi-Agent Platform agents
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - ai
  - agents
  - multi-agent
  - software-engineering

maintainers:
  - name: Platform Team
    email: platform@multi-agent.com

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "17.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: nats
    version: "0.19.x"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
